<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knave 2e — Character Sheet</title>
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div id="app"></div>

  <!-- Owlbear SDK (loaded async; sheet works without it too). -->
  <!--
    Using the UMD build via CDN. If you're hosting offline or want
    to pin a version, download the file and serve it locally:
       https://www.unpkg.com/@owlbear-rodeo/sdk@1.3.8/dist/index.umd.js
  -->
  <script src="https://www.unpkg.com/@owlbear-rodeo/sdk@1.3.8/dist/index.umd.js"></script>

  <!-- Our app as native ES modules. No bundler needed. -->
  <script type="module">
    import { mount }   from './src/ui.js';
    import { initOBR } from './src/obr.js';

    mount(document.getElementById('app'));

    // Kick off Owlbear sync after mount so the UI is responsive immediately,
    // even if the SDK is slow / blocked / absent.
    initOBR({
      onPlayerListChange: () => {
        import('./src/ui.js').then(mod => mod.render());
      },
      onViewChange: () => {
        import('./src/ui.js').then(mod => mod.render());
      }
    }).catch(err => console.warn('OBR init failed (running standalone)', err));
  </script>
</body>
</html>
